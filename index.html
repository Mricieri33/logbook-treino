<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOGBOOK DE TREINO</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#121213">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#121213;
    --panel:#1A1A1C;
    --panel-alt:#202023;
    --border:#2C2C30;
    --text:#EDEDED;
    --muted:#94949A;
    --accent:#D6402C;
    --accent-dim:#7A2A20;
    --ok:#4CAF6D;
    --warn:#E0A83E;
    --steel:#5B6472;
  }
  *{box-sizing:border-box;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    margin:0;
    padding:0 0 60px 0;
  }
  .topbar{
    background:linear-gradient(180deg,#1c1c1e,#141415);
    border-bottom:3px solid var(--accent);
    padding:18px 20px 14px 20px;
    position:sticky;
    top:0;
    z-index:20;
  }
  .topbar h1{
    font-family:"Arial Black",Arial,sans-serif;
    font-weight:900;
    font-size:22px;
    letter-spacing:2px;
    margin:0 0 2px 0;
    text-transform:uppercase;
  }
  .topbar h1 span{color:var(--accent);}
  .topbar .sub{color:var(--muted);font-size:12px;letter-spacing:0.5px;}
  .tabs{
    display:flex;
    gap:6px;
    margin-top:14px;
  }
  .tab-btn{
    background:var(--panel-alt);
    border:1px solid var(--border);
    color:var(--muted);
    padding:8px 16px;
    font-size:12px;
    font-weight:700;
    letter-spacing:1px;
    text-transform:uppercase;
    cursor:pointer;
    border-radius:3px;
  }
  .tab-btn.active{
    background:var(--accent);
    color:#fff;
    border-color:var(--accent);
  }
  .wrap{max-width:1100px;margin:0 auto;padding:18px 16px;}
  .month-nav{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
    margin:10px 0 20px 0;
  }
  .month-nav button{
    background:var(--panel-alt);
    border:1px solid var(--border);
    color:var(--text);
    width:34px;height:34px;
    border-radius:3px;
    font-size:16px;
    cursor:pointer;
  }
  .month-nav .label{
    font-family:"Arial Black",Arial,sans-serif;
    font-size:20px;
    letter-spacing:2px;
    text-transform:uppercase;
    min-width:150px;
    text-align:center;
  }
  .day-tabs{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-bottom:16px;
  }
  .day-btn{
    background:var(--panel-alt);
    border:1px solid var(--border);
    color:var(--muted);
    padding:9px 14px;
    font-size:12px;
    font-weight:700;
    letter-spacing:0.5px;
    text-transform:uppercase;
    cursor:pointer;
    border-radius:3px;
    flex:1 1 auto;
    min-width:110px;
  }
  .day-btn.active{
    background:var(--panel);
    color:var(--text);
    border-color:var(--accent);
    box-shadow:inset 0 -3px 0 var(--accent);
  }
  .day-focus{
    color:var(--muted);
    font-size:12px;
    letter-spacing:0.3px;
  }
  .day-focus-row{
    display:flex;
    align-items:center;
    flex-wrap:wrap;
    margin-bottom:14px;
  }
  .off-day{
    background:var(--panel);
    border:1px dashed var(--border);
    border-radius:6px;
    padding:40px 20px;
    text-align:center;
    color:var(--muted);
    font-family:"Arial Black",Arial,sans-serif;
    letter-spacing:3px;
    text-transform:uppercase;
  }
  .week-legend{
    color:var(--muted);
    font-size:11px;
    margin-bottom:10px;
    padding:8px 10px;
    background:var(--panel-alt);
    border-left:2px solid var(--steel);
    border-radius:0 4px 4px 0;
  }
  table{
    width:100%;
    border-collapse:collapse;
    background:var(--panel);
    border-radius:6px;
    overflow:hidden;
  }
  th,td{
    border:1px solid var(--border);
    padding:8px 6px;
    text-align:center;
    vertical-align:middle;
  }
  th{
    background:var(--panel-alt);
    font-size:10px;
    letter-spacing:0.5px;
    text-transform:uppercase;
    color:var(--muted);
    font-weight:700;
  }
  th.current-week{color:var(--accent);}
  td.exname{
    text-align:left;
    min-width:190px;
    font-size:13px;
    font-weight:600;
  }
  td.exname .target{
    display:block;
    font-size:10px;
    color:var(--muted);
    font-weight:400;
    margin-top:2px;
    cursor:pointer;
    text-decoration:underline dotted;
  }
  td.exname .target:hover{color:var(--text);}
  .settarget-header{
    display:flex;
    gap:8px;
    font-size:10px;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:0.5px;
    margin-bottom:6px;
  }
  .settarget-header span:first-child{flex:1;}
  .settarget-header span:not(:first-child){width:80px;}
  .settarget-row{
    display:flex;
    gap:8px;
    align-items:center;
    margin-bottom:8px;
  }
  .settarget-num{
    flex:1;
    font-size:12px;
    color:var(--text);
  }
  .settarget-row input{
    width:80px;
    background:var(--panel-alt);
    border:1px solid var(--border);
    color:var(--text);
    padding:8px;
    border-radius:4px;
    font-size:12px;
    margin-bottom:0;
  }
  .settarget-row input:disabled{opacity:0.35;}
  .cell-inputs input:disabled{opacity:0.45;}
  .bw-toggle{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:12px;
    color:var(--text);
    background:var(--panel-alt);
    border:1px solid var(--border);
    border-radius:4px;
    padding:9px 10px;
    margin-bottom:6px;
    cursor:pointer;
  }
  .bw-toggle input{width:auto;margin:0;}
  .bw-hint{
    font-size:10px;
    color:var(--muted);
    margin:0 0 12px 0;
    line-height:1.4;
  }
  .rename-btn{
    background:none;
    border:none;
    color:var(--steel);
    cursor:pointer;
    font-size:11px;
    margin-left:6px;
    text-decoration:underline;
  }
  .exname-row{
    display:flex;
    align-items:flex-start;
    gap:8px;
  }
  .reorder-btns{
    display:flex;
    flex-direction:column;
    gap:2px;
    flex-shrink:0;
  }
  .ord-btn{
    background:var(--panel-alt);
    border:1px solid var(--border);
    color:var(--muted);
    width:20px;
    height:17px;
    font-size:8px;
    line-height:1;
    border-radius:2px;
    cursor:pointer;
    padding:0;
  }
  .ord-btn:disabled{opacity:0.2;cursor:default;}
  .ord-btn:not(:disabled):hover{color:var(--text);border-color:var(--steel);}
  .exname-text{flex:1;min-width:0;}
  .cell-inputs{
    display:flex;
    gap:3px;
    justify-content:center;
  }
  .cell-inputs input{
    width:38px;
    background:var(--panel-alt);
    border:1px solid var(--border);
    color:var(--text);
    text-align:center;
    padding:5px 2px;
    border-radius:3px;
    font-size:12px;
  }
  .cell-inputs input:focus{
    outline:none;
    border-color:var(--accent);
  }
  .cell-labels{
    display:flex;
    gap:3px;
    justify-content:center;
    font-size:8px;
    color:var(--muted);
    margin-bottom:2px;
    letter-spacing:0.5px;
  }
  .cell-labels span{width:38px;}
  .loadbar-track{
    height:5px;
    background:var(--panel-alt);
    border-radius:3px;
    margin-top:6px;
    overflow:hidden;
  }
  .loadbar-fill{
    height:100%;
    background:var(--accent);
  }
  .suggestion{
    font-size:10px;
    color:var(--warn);
    margin-top:5px;
    text-align:left;
  }
  .suggestion.ok{color:var(--ok);}
  .row-actions{margin-top:14px;display:flex;gap:8px;}
  .btn-add{
    background:var(--panel-alt);
    border:1px dashed var(--steel);
    color:var(--muted);
    padding:9px 14px;
    border-radius:4px;
    font-size:12px;
    cursor:pointer;
  }
  .swap-control{
    display:flex;
    gap:8px;
    margin-top:14px;
    align-items:center;
    flex-wrap:wrap;
  }
  .swap-control select{flex:1;min-width:180px;}
  .day-btn.off{opacity:0.5;}
  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.65);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:100;
    padding:20px;
  }
  .modal-box{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:6px;
    padding:18px;
    max-width:400px;
    width:100%;
  }
  .modal-box .modal-msg{
    font-size:13px;
    color:var(--text);
    margin-bottom:14px;
    line-height:1.45;
  }
  .modal-box label{
    font-size:11px;
    color:var(--muted);
    display:block;
    margin-bottom:4px;
  }
  .modal-box input{
    width:100%;
    background:var(--panel-alt);
    border:1px solid var(--border);
    color:var(--text);
    padding:9px;
    border-radius:4px;
    margin-bottom:10px;
    font-size:13px;
  }
  .modal-box input:focus{outline:none;border-color:var(--accent);}
  .modal-actions{
    display:flex;
    gap:8px;
    justify-content:flex-end;
    margin-top:6px;
  }
  .modal-actions button{
    padding:9px 16px;
    border-radius:4px;
    font-size:12px;
    font-weight:700;
    cursor:pointer;
    border:1px solid var(--border);
  }
  .btn-cancel{background:var(--panel-alt);color:var(--muted);}
  .btn-confirm{background:var(--accent);color:#fff;border-color:var(--accent);}
  .app-version{
    position:fixed;
    bottom:8px;
    right:10px;
    font-size:10px;
    color:var(--muted);
    opacity:0.55;
    letter-spacing:0.5px;
    pointer-events:none;
    z-index:5;
  }
  .extra-add-btn{
    margin-top:6px;
    font-size:9px;
    color:var(--steel);
    cursor:pointer;
    text-align:center;
    border:1px dashed var(--border);
    border-radius:3px;
    padding:2px 0;
  }
  .extra-add-btn:hover{color:var(--text);border-color:var(--steel);}
  .extra-badge{
    margin-top:6px;
    font-size:9px;
    color:var(--warn);
    cursor:pointer;
    text-align:center;
    background:var(--panel-alt);
    border-radius:3px;
    padding:3px 4px;
    line-height:1.3;
    word-break:break-word;
  }
  .extra-badge:hover{outline:1px solid var(--steel);}
  .extra-part-row{
    display:flex;
    gap:6px;
    margin-bottom:6px;
    align-items:center;
  }
  .extra-part-row input{
    flex:1;
    background:var(--panel-alt);
    border:1px solid var(--border);
    color:var(--text);
    padding:7px;
    border-radius:4px;
    font-size:12px;
    margin-bottom:0;
  }
  .extra-part-row .ord-btn{width:26px;height:26px;font-size:11px;flex-shrink:0;}
  .save-indicator{
    color:var(--muted);
    font-size:11px;
    margin-top:10px;
    text-align:right;
    min-height:14px;
  }
  /* ANALYSIS TAB */
  .analysis-controls{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:20px;
  }
  select{
    background:var(--panel-alt);
    border:1px solid var(--border);
    color:var(--text);
    padding:9px 10px;
    border-radius:4px;
    font-size:13px;
  }
  .chart-panel{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:6px;
    padding:16px;
    margin-bottom:20px;
  }
  .chart-panel h3{
    font-family:"Arial Black",Arial,sans-serif;
    font-size:13px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    margin:0 0 12px 0;
    color:var(--muted);
  }
  .chart-panel h3 span{color:var(--accent);}
  canvas{max-height:280px;}
  .insight{
    background:var(--panel-alt);
    border-left:3px solid var(--accent);
    padding:10px 12px;
    font-size:12px;
    color:var(--text);
    margin-top:10px;
    border-radius:0 4px 4px 0;
  }
  .empty-state{
    color:var(--muted);
    font-size:12px;
    text-align:center;
    padding:30px 10px;
  }
  .month-acc{
    border:1px solid var(--border);
    border-radius:4px;
    margin-bottom:8px;
    overflow:hidden;
  }
  .month-acc-head{
    background:var(--panel-alt);
    padding:10px 12px;
    cursor:pointer;
    font-weight:700;
    letter-spacing:1px;
    font-size:12px;
    text-transform:uppercase;
    display:flex;
    justify-content:space-between;
    user-select:none;
  }
  .month-acc-head .chev{color:var(--muted);transition:transform .15s;}
  .month-acc.open .month-acc-head .chev{transform:rotate(180deg);}
  .month-acc-body{display:none;padding:6px 12px 10px 12px;}
  .month-acc.open .month-acc-body{display:block;}
  .detail-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    padding:7px 0;
    border-bottom:1px solid var(--border);
    font-size:12px;
  }
  .detail-row:last-child{border-bottom:none;}
  .detail-row .exlabel{flex:1;}
  .detail-row .weekspan{color:var(--muted);font-size:10px;}
  .delta-pos{color:var(--ok);font-weight:700;}
  .delta-neg{color:var(--warn);font-weight:700;}
  .delta-zero{color:var(--muted);}
  @media(max-width:600px){
    td.exname{min-width:130px;font-size:12px;}
    .cell-inputs input{width:30px;}
    .cell-labels span{width:30px;}
  }
</style>
</head>
<body>

<div class="topbar">
  <h1>LOGBOOK DE <span>TREINO</span></h1>
  <div class="sub" id="dateSub">Curitiba, PR</div>
  <div class="tabs">
    <button class="tab-btn active" id="tabTreinoBtn" onclick="switchTab('treino')">Treino</button>
    <button class="tab-btn" id="tabAnaliseBtn" onclick="switchTab('analise')">Análise</button>
  </div>
</div>

<div class="wrap">

  <!-- TREINO TAB -->
  <div id="tabTreino">
    <div class="month-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <div class="label" id="monthLabel">JUL/26</div>
      <button onclick="changeMonth(1)">›</button>
    </div>

    <div class="day-tabs" id="dayTabs"></div>
    <div class="day-focus-row">
      <span class="day-focus" id="dayFocus"></span>
      <button class="rename-btn" onclick="editDayFocus()">editar</button>
    </div>
    <div id="dayContent"></div>
    <div class="save-indicator" id="saveIndicator"></div>
  </div>

  <!-- ANALISE TAB -->
  <div id="tabAnalise" style="display:none;">
    <div class="analysis-controls">
      <select id="selDia" onchange="onDiaChange()"></select>
      <select id="selExercicio" onchange="renderCharts()"></select>
    </div>

    <div class="chart-panel">
      <h3>Evolução <span>Semanal</span> — <span id="monthChartLabel"></span></h3>
      <canvas id="weeklyChart"></canvas>
      <div class="insight" id="weeklyInsight"></div>
      <div id="weeklyDeltas" style="margin-top:10px;"></div>
    </div>

    <div class="chart-panel">
      <h3>Evolução <span>Mensal</span></h3>
      <canvas id="monthlyChart"></canvas>
      <div class="insight" id="monthlyInsight"></div>
    </div>

    <div class="chart-panel">
      <h3>Detalhe <span>por Mês</span></h3>
      <div id="monthlyDetail"></div>
    </div>
  </div>

</div>

<div class="modal-overlay" id="modalOverlay" style="display:none;">
  <div class="modal-box" id="modalBox"></div>
</div>

<div class="app-version">v1.5</div>

<script>
/* ============ PLANO BASE (dias fixos, slots editáveis) ============ */
const DEFAULT_PLAN = {
  days: [
    { id:'seg', label:'Segunda', focus:'Peito 1 (superior) + Tríceps + Antebraço', off:false, slots:[
      {id:'seg-1', name:'Supino inclinado barra (30°)', sets:4, reps:'6-8'},
      {id:'seg-2', name:'Supino reto halteres', sets:3, reps:'8-10'},
      {id:'seg-3', name:'Crucifixo inclinado halteres', sets:3, reps:'12'},
      {id:'seg-4', name:'Crossover no cabo (baixo pra cima)', sets:3, reps:'15'},
      {id:'seg-5', name:'Mergulho em paralelas', sets:3, reps:'8-10'},
      {id:'seg-6', name:'Tríceps testa barra EZ', sets:3, reps:'10'},
      {id:'seg-7', name:'Rosca de punho barra', sets:3, reps:'15'}
    ]},
    { id:'ter', label:'Terça', focus:'Costas + Bíceps + Antebraço', off:false, slots:[
      {id:'ter-1', name:'Levantamento terra em bloco (abaixo do joelho)', sets:4, reps:'5-6'},
      {id:'ter-2', name:'Barra fixa pegada aberta', sets:4, reps:'8-10'},
      {id:'ter-3', name:'Remada curvada barra', sets:3, reps:'8'},
      {id:'ter-4', name:'Remada cavalinho (T-bar)', sets:3, reps:'10'},
      {id:'ter-5', name:'Pull-over halter', sets:3, reps:'12'},
      {id:'ter-6', name:'Rosca scott', sets:4, reps:'10'},
      {id:'ter-7', name:'Rosca concentrada halter', sets:3, reps:'12'},
      {id:'ter-8', name:'Rosca inversa barra', sets:3, reps:'15'}
    ]},
    { id:'qua', label:'Quarta', focus:'Ombros (posterior + largura) + Panturrilha + Antebraço', off:false, slots:[
      {id:'qua-1', name:'Crucifixo invertido máquina ou halteres', sets:4, reps:'12'},
      {id:'qua-2', name:'Face pull', sets:4, reps:'15'},
      {id:'qua-3', name:'Desenvolvimento atrás da nuca', sets:4, reps:'8'},
      {id:'qua-4', name:'Elevação lateral halteres', sets:4, reps:'12-15'},
      {id:'qua-5', name:'Panturrilha em pé', sets:4, reps:'15'},
      {id:'qua-6', name:'Rosca de punho inversa', sets:3, reps:'15'}
    ]},
    { id:'qui', label:'Quinta', focus:'Descanso', off:true, slots:[] },
    { id:'sex', label:'Sexta', focus:'Pernas (agachamento + posterior) + Panturrilha', off:false, slots:[
      {id:'sex-1', name:'Agachamento livre barra', sets:4, reps:'6-8'},
      {id:'sex-2', name:'Stiff barra', sets:4, reps:'8-10'},
      {id:'sex-3', name:'Mesa flexora', sets:4, reps:'12'},
      {id:'sex-4', name:'Elevação pélvica ou bom dia', sets:3, reps:'10'},
      {id:'sex-5', name:'Cadeira extensora', sets:2, reps:'12'},
      {id:'sex-6', name:'Panturrilha sentado', sets:3, reps:'15'}
    ]},
    { id:'sab', label:'Sábado', focus:'Peito 2 (geral/inferior) + Tríceps', off:false, slots:[
      {id:'sab-1', name:'Supino reto máquina ou smith', sets:4, reps:'6-8'},
      {id:'sab-2', name:'Supino declinado ou peck deck', sets:3, reps:'10-12'},
      {id:'sab-3', name:'Crucifixo reto ou máquina', sets:3, reps:'12'},
      {id:'sab-4', name:'Mergulho em paralelas', sets:3, reps:'8-10'},
      {id:'sab-5', name:'Tríceps corda na polia', sets:3, reps:'12'}
    ]},
    { id:'dom', label:'Domingo', focus:'Descanso', off:true, slots:[] }
  ]
};

const MONTH_NAMES = ['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];

let plan = null;
let entries = {}; // { "YYYY-MM": { slotId: { "1": {sets,reps,weight}, ... } } }
let viewDate = new Date(); // controls which month is shown in Treino tab
let activeDayId = null;
let saveTimer = null;

/* ============ STORAGE (navegador / cache do celular) ============ */
async function loadData(){
  try{
    const p = localStorage.getItem('treino_plan');
    plan = p ? JSON.parse(p) : JSON.parse(JSON.stringify(DEFAULT_PLAN));
  }catch(e){
    plan = JSON.parse(JSON.stringify(DEFAULT_PLAN));
  }
  try{
    const e = localStorage.getItem('treino_entries');
    entries = e ? JSON.parse(e) : {};
  }catch(e){
    entries = {};
  }
}

function scheduleSave(){
  const ind = document.getElementById('saveIndicator');
  if(ind) ind.textContent = 'salvando...';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    try{
      localStorage.setItem('treino_plan', JSON.stringify(plan));
      localStorage.setItem('treino_entries', JSON.stringify(entries));
      if(ind) ind.textContent = 'salvo';
      setTimeout(()=>{ if(ind) ind.textContent=''; }, 1500);
    }catch(err){
      if(ind) ind.textContent = 'erro ao salvar';
    }
  }, 500);
}

/* ============ DATE / WEEK HELPERS ============ */
function monthKey(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}
function daysInMonth(year, month){
  return new Date(year, month+1, 0).getDate();
}
function weeksInMonth(year, month){
  const total = daysInMonth(year, month);
  const numWeeks = Math.ceil(total/7);
  const weeks = [];
  for(let w=1; w<=numWeeks; w++){
    const startDay = (w-1)*7+1;
    const endDay = Math.min(w*7, total);
    weeks.push({index:w, startDay, endDay});
  }
  return weeks;
}
function currentWeekIndexIfThisMonth(year, month){
  const today = new Date();
  if(today.getFullYear()===year && today.getMonth()===month){
    return Math.ceil(today.getDate()/7);
  }
  return null;
}
function monthLabel(d){
  return MONTH_NAMES[d.getMonth()]+'/'+String(d.getFullYear()).slice(2);
}

/* ============ TAB SWITCH ============ */
function switchTab(tab){
  document.getElementById('tabTreino').style.display = tab==='treino' ? 'block':'none';
  document.getElementById('tabAnalise').style.display = tab==='analise' ? 'block':'none';
  document.getElementById('tabTreinoBtn').classList.toggle('active', tab==='treino');
  document.getElementById('tabAnaliseBtn').classList.toggle('active', tab==='analise');
  if(tab==='analise'){
    populateAnalysisSelects();
    renderCharts();
  }
}

/* ============ MONTH NAV ============ */
function changeMonth(delta){
  viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth()+delta, 1);
  renderMonth();
}

function renderMonth(){
  document.getElementById('monthLabel').textContent = monthLabel(viewDate);
  renderDayTabs();
  if(!activeDayId){
    const today = new Date();
    const todayDayIdx = today.getDay(); // 0=dom..6=sab
    const map = {1:'seg',2:'ter',3:'qua',4:'qui',5:'sex',6:'sab',0:'dom'};
    activeDayId = map[todayDayIdx];
  }
  renderDayContent();
}

function renderDayTabs(){
  const wrap = document.getElementById('dayTabs');
  wrap.innerHTML = '';
  plan.days.forEach(day=>{
    const btn = document.createElement('button');
    btn.className = 'day-btn' + (day.id===activeDayId ? ' active':'') + (day.off ? ' off':'');
    btn.textContent = day.label;
    btn.onclick = ()=>{ activeDayId = day.id; renderDayTabs(); renderDayContent(); };
    wrap.appendChild(btn);
  });
}

/* ============ DAY CONTENT (TABLE) ============ */
function renderDayContent(){
  const day = plan.days.find(d=>d.id===activeDayId);
  document.getElementById('dayFocus').textContent = day.focus;
  const container = document.getElementById('dayContent');
  container.innerHTML = '';

  if(day.off){
    container.innerHTML = '<div class="off-day">Descanso</div>';
    container.appendChild(buildSwapControl(day));
    return;
  }

  const year = viewDate.getFullYear();
  const month = viewDate.getMonth();
  const weeks = weeksInMonth(year, month);
  const curWeek = currentWeekIndexIfThisMonth(year, month);
  const mk = monthKey(viewDate);
  entries[mk] = entries[mk] || {};

  const legend = document.createElement('div');
  legend.className = 'week-legend';
  legend.textContent = 'Registre a última série (máx. 4): nº da série + reps e kg dela (aceita decimal, ex: 62,5). Toque na meta abaixo do exercício para definir reps/kg de cada série ou marcar peso corporal.';
  container.appendChild(legend);

  const table = document.createElement('table');
  const thead = document.createElement('thead');
  const headRow = document.createElement('tr');
  headRow.innerHTML = '<th style="text-align:left;">Exercício</th>';
  weeks.forEach(w=>{
    const th = document.createElement('th');
    th.className = (curWeek===w.index) ? 'current-week' : '';
    th.innerHTML = 'Sem '+w.index+'<br><span style="font-weight:400;">'+w.startDay+'-'+w.endDay+'</span>';
    headRow.appendChild(th);
  });
  thead.appendChild(headRow);
  table.appendChild(thead);

  const tbody = document.createElement('tbody');

  day.slots.forEach((slot, slotIdx)=>{
    const tr = document.createElement('tr');
    const isFirst = slotIdx===0;
    const isLast = slotIdx===day.slots.length-1;

    const nameCell = document.createElement('td');
    nameCell.className = 'exname';
    nameCell.innerHTML =
      '<div class="exname-row">'+
        '<div class="reorder-btns">'+
          '<button class="ord-btn" '+(isFirst?'disabled':'')+' onclick="moveSlot(\''+day.id+'\',\''+slot.id+'\',-1)" title="Mover para cima">&#9650;</button>'+
          '<button class="ord-btn" '+(isLast?'disabled':'')+' onclick="moveSlot(\''+day.id+'\',\''+slot.id+'\',1)" title="Mover para baixo">&#9660;</button>'+
        '</div>'+
        '<div class="exname-text">'+
          escapeHtml(slot.name) +
          '<button class="rename-btn" onclick="renameSlot(\''+day.id+'\',\''+slot.id+'\')">trocar</button>' +
          '<span class="target" onclick="openSetTargetsModal(\''+day.id+'\',\''+slot.id+'\')" title="Toque para definir a meta de cada série">'+targetDisplay(slot)+'</span>'+
        '</div>'+
      '</div>';
    tr.appendChild(nameCell);

    entries[mk][slot.id] = entries[mk][slot.id] || {};
    const slotEntries = entries[mk][slot.id];

    // find max weight ever recorded for this slot across all months (for loadbar scale)
    const maxW = maxWeightForSlot(slot.id);

    weeks.forEach(w=>{
      const td = document.createElement('td');
      const key = String(w.index);
      const e = slotEntries[key] || {};

      const cellId = mk+'_'+slot.id+'_'+key;
      const slotIsBW = !!slot.bodyweight;
      const slotTotalSets = effectiveSets(slot);
      td.innerHTML =
        '<div class="cell-labels"><span title="Número da última série feita (máx. 4)">série</span><span title="Reps da última série">reps</span><span title="'+(slotIsBW?'Exercício de peso corporal — sem carga externa':'Carga (kg) da última série — aceita decimal')+'">'+(slotIsBW?'PC':'kg')+'</span></div>' +
        '<div class="cell-inputs">' +
          '<input type="number" min="0" max="4" placeholder="'+slotTotalSets+'" value="'+(e.sets??'')+'" title="Qual foi a última série feita (máx. 4)" onchange="updateEntry(\''+mk+'\',\''+slot.id+'\',\''+key+'\',\'sets\',this.value)">' +
          '<input type="number" min="0" placeholder="0" value="'+(e.reps??'')+'" title="Reps feitas nessa última série" onchange="updateEntry(\''+mk+'\',\''+slot.id+'\',\''+key+'\',\'reps\',this.value)">' +
          (slotIsBW
            ? '<input type="text" value="PC" disabled title="Exercício de peso corporal — progressão medida por reps">'
            : '<input type="text" inputmode="decimal" placeholder="0" value="'+(e.weight??'')+'" title="Peso (kg) da última série — aceita decimal (ex: 62,5)" onchange="updateEntry(\''+mk+'\',\''+slot.id+'\',\''+key+'\',\'weight\',this.value)">') +
        '</div>';

      if(e.weight){
        const pct = maxW>0 ? Math.max(6,Math.round((e.weight/maxW)*100)) : 100;
        const bar = document.createElement('div');
        bar.className = 'loadbar-track';
        bar.innerHTML = '<div class="loadbar-fill" style="width:'+pct+'%;"></div>';
        td.appendChild(bar);
      }

      const extraEl = document.createElement('div');
      if(e.extra && e.extra.parts && e.extra.parts.length){
        extraEl.className = 'extra-badge';
        extraEl.textContent = extraSummary(e.extra);
        extraEl.title = 'Toque para editar';
      } else {
        extraEl.className = 'extra-add-btn';
        extraEl.textContent = '+ drop/cluster';
      }
      extraEl.onclick = ()=> openExtraSetModal(mk, slot.id, key);
      td.appendChild(extraEl);

      tr.appendChild(td);
    });

    tbody.appendChild(tr);

    // suggestion row (spans full width, based on last filled week vs target)
    const sugTr = document.createElement('tr');
    const sugTd = document.createElement('td');
    sugTd.colSpan = weeks.length+1;
    sugTd.style.borderTop = 'none';
    sugTd.style.padding = '0 6px 10px 6px';
    sugTd.innerHTML = buildSuggestionHtml(slot, slotEntries, weeks);
    sugTr.appendChild(sugTd);
    tbody.appendChild(sugTr);
  });

  table.appendChild(tbody);
  container.appendChild(table);

  const actions = document.createElement('div');
  actions.className = 'row-actions';
  actions.innerHTML = '<button class="btn-add" onclick="addSlot(\''+day.id+'\')">+ adicionar exercício</button>';
  container.appendChild(actions);
  container.appendChild(buildSwapControl(day));

function effectiveSets(slot){
  // Quantas séries o exercício realmente tem: a última com meta preenchida (máx. 4).
  if(slot.setTargets){
    const limit = Math.min(slot.setTargets.length, 4);
    for(let i=limit-1; i>=0; i--){
      const t = slot.setTargets[i];
      if(t && t.reps!=null) return i+1;
    }
  }
  return Math.min(slot.sets || 4, 4);
}

function targetDisplay(slot){
  const bw = slot.bodyweight ? ' · PC' : '';
  if(slot.setTargets && slot.setTargets.some(t=>t && t.reps!=null)){
    const n = effectiveSets(slot);
    const seq = [];
    for(let i=0;i<n;i++){
      const t = slot.setTargets[i];
      seq.push(t && t.reps!=null ? t.reps : '-');
    }
    return seq.join('·')+' reps'+bw;
  }
  return slot.sets+'x'+slot.reps+bw;
}

function targetRepsForSet(slot, setNumber){
  if(slot.setTargets && setNumber>=1){
    const t = slot.setTargets[setNumber-1];
    if(t && t.reps!=null) return Number(t.reps);
  }
  return parseTopRep(slot.reps);
}

function targetKgForSet(slot, setNumber){
  if(slot.setTargets && setNumber>=1){
    const t = slot.setTargets[setNumber-1];
    if(t && t.kg!=null) return Number(t.kg);
  }
  return null;
}

function openSetTargetsModal(dayId, slotId){
  const day = plan.days.find(d=>d.id===dayId);
  const slot = day.slots.find(s=>s.id===slotId);
  const legacyTop = parseTopRep(slot.reps);
  const planned = Math.min(slot.sets || 4, 4);
  const isBW = !!slot.bodyweight;

  let rowsHtml = '';
  for(let i=1; i<=4; i++){
    const existing = slot.setTargets && slot.setTargets[i-1];
    const repsVal = (existing && existing.reps!=null) ? existing.reps : (i<=planned ? legacyTop : '');
    const kgVal = (existing && existing.kg!=null) ? existing.kg : '';
    rowsHtml +=
      '<div class="settarget-row">'+
        '<span class="settarget-num">'+i+'ª série</span>'+
        '<input type="number" min="0" class="st-reps" placeholder="reps" value="'+repsVal+'">'+
        '<input type="text" inputmode="decimal" class="st-kg" placeholder="'+(isBW?'PC':'kg')+'" value="'+kgVal+'"'+(isBW?' disabled':'')+'>'+
      '</div>';
  }

  showModal(
    '<div class="modal-msg">Meta por série de <b>'+escapeHtml(slot.name)+'</b> — deixe em branco as séries que não usa (máx. 4). A sugestão compara a última série registrada contra a meta dela.</div>'+
    '<label class="bw-toggle"><input type="checkbox" id="modalBodyweight" '+(isBW?'checked':'')+' onchange="toggleBodyweightFields()"> Peso corporal (não usa peso neste exercício)</label>'+
    '<div class="bw-hint">Marcado: sem carga externa. A progressão passa a ser medida só por reps, e o campo kg da semana fica travado como "PC".</div>'+
    '<div class="settarget-header"><span></span><span>reps</span><span>kg (ref)</span></div>'+
    rowsHtml+
    '<div class="modal-actions">'+
      '<button class="btn-cancel" onclick="closeModal()">Cancelar</button>'+
      '<button class="btn-confirm" onclick="saveSetTargets(\''+dayId+'\',\''+slotId+'\')">Salvar</button>'+
    '</div>'
  );
}

function toggleBodyweightFields(){
  const on = document.getElementById('modalBodyweight').checked;
  document.querySelectorAll('.st-kg').forEach(inp=>{
    inp.disabled = on;
    inp.placeholder = on ? 'PC' : 'kg';
    if(on) inp.value = '';
  });
}

function saveSetTargets(dayId, slotId){
  const day = plan.days.find(d=>d.id===dayId);
  const slot = day.slots.find(s=>s.id===slotId);
  const bw = document.getElementById('modalBodyweight').checked;
  const repsInputs = document.querySelectorAll('.st-reps');
  const kgInputs = document.querySelectorAll('.st-kg');
  const targets = [];
  repsInputs.forEach((input, idx)=>{
    const repsNum = parseDecimal(input.value);
    const kgNum = bw ? undefined : parseDecimal(kgInputs[idx].value);
    targets[idx] = {
      reps: repsNum != null ? repsNum : null,
      kg: kgNum != null ? kgNum : null
    };
  });
  slot.bodyweight = bw;
  slot.setTargets = targets;
  scheduleSave();
  closeModal();
  renderDayContent();
}

function buildSuggestionHtml(slot, slotEntries, weeks){
  // find latest week with data
  let latest = null;
  for(let i=weeks.length; i>=1; i--){
    if(slotEntries[String(i)] && (slotEntries[String(i)].reps || slotEntries[String(i)].weight)){
      latest = slotEntries[String(i)];
      break;
    }
  }
  if(!latest) return '';
  const totalSets = effectiveSets(slot);
  const isBW = !!slot.bodyweight;
  const setNum = Number(latest.sets)||0;
  const refSet = setNum || totalSets;                       // a série que foi registrada
  const targetSet = Math.min(refSet, totalSets) || totalSets;
  const topRep = targetRepsForSet(slot, targetSet);
  const refKg = isBW ? null : targetKgForSet(slot, targetSet);
  const refKgTxt = refKg!=null ? ' · '+refKg+'kg (ref)' : (isBW ? ' · peso corporal' : '');
  const isFinal = refSet >= totalSets;

  if(!latest.reps){
    return '<div class="suggestion">Meta da '+refSet+'ª série: '+topRep+' reps'+refKgTxt+'. Registre as reps para saber se bateu.</div>';
  }

  const doneReps = Number(latest.reps);
  const placar = doneReps+'/'+topRep+' reps'+refKgTxt;

  if(doneReps >= topRep){
    const head = 'Meta batida na '+refSet+'ª série ('+placar+').';
    if(isFinal){
      const advice = isBW
        ? ' Sugestão: subir a meta de reps ou aumentar a dificuldade (pausa na contração, cadência mais lenta, lastro).'
        : ' Sugestão: subir carga (+2,5 a 5kg em exercício grande, +1 a 2kg em isolador) e voltar ao mínimo de reps.';
      return '<div class="suggestion ok">'+head+' Era a última série do exercício.'+advice+'</div>';
    }
    return '<div class="suggestion ok">'+head+' Ainda faltam séries até a '+totalSets+'ª para fechar a progressão.</div>';
  }

  const falta = topRep - doneReps;
  const tail = isFinal ? '' : ' Ainda faltam séries até a '+totalSets+'ª.';
  return '<div class="suggestion">Meta não batida na '+refSet+'ª série ('+placar+') — faltam '+falta+' reps.'+tail+'</div>';
}

function parseTopRep(repsStr){
  const parts = String(repsStr).replace('+','').split('-');
  return Number(parts[parts.length-1]) || 0;
}

function maxWeightForSlot(slotId){
  let max = 0;
  Object.keys(entries).forEach(mk=>{
    const slotData = entries[mk][slotId];
    if(!slotData) return;
    Object.values(slotData).forEach(e=>{
      if(e.weight && Number(e.weight) > max) max = Number(e.weight);
    });
  });
  return max;
}

function parseDecimal(value){
  const raw = String(value).replace(',', '.').trim();
  if(raw === '') return undefined;
  const num = Number(raw);
  return isNaN(num) ? undefined : num;
}

function updateEntry(mk, slotId, weekKey, field, value){
  entries[mk] = entries[mk] || {};
  entries[mk][slotId] = entries[mk][slotId] || {};
  entries[mk][slotId][weekKey] = entries[mk][slotId][weekKey] || {};
  let num = parseDecimal(value);
  if(field === 'sets' && num != null && num > 4) num = 4;
  entries[mk][slotId][weekKey][field] = num;
  scheduleSave();
  renderDayContent(); // refresh loadbars/suggestions
}

/* ============ DROP SET / CLUSTER SET ============ */
function extraSummary(extra){
  if(!extra || !extra.parts || !extra.parts.length) return '';
  const label = extra.type==='cluster' ? 'Cluster' : 'Drop';
  const partsStr = extra.parts.map(p=>{
    const w = (p.weight!=null && p.weight!=='') ? p.weight+'kg' : '';
    const r = (p.reps!=null && p.reps!=='') ? p.reps+'r' : '';
    return [w,r].filter(Boolean).join(' ');
  }).join(' → ');
  return label+': '+partsStr;
}

function buildExtraPartRowHtml(weight, reps){
  return '<div class="extra-part-row">'+
    '<input type="number" step="0.5" class="extra-weight" placeholder="kg" value="'+(weight??'')+'">'+
    '<input type="number" class="extra-reps" placeholder="reps" value="'+(reps??'')+'">'+
    '<button type="button" class="ord-btn" onclick="this.parentElement.remove()" title="Remover parte">&#10005;</button>'+
  '</div>';
}

function addExtraPartRow(){
  const container = document.getElementById('extraPartsContainer');
  const div = document.createElement('div');
  div.innerHTML = buildExtraPartRowHtml('', '');
  container.appendChild(div.firstElementChild);
}

function openExtraSetModal(mk, slotId, weekKey){
  const cellEntry = entries[mk] && entries[mk][slotId] && entries[mk][slotId][weekKey];
  const existing = cellEntry && cellEntry.extra ? cellEntry.extra : null;
  const type = existing ? existing.type : 'drop';
  const parts = existing && existing.parts.length ? existing.parts : [{weight:'',reps:''},{weight:'',reps:''}];

  let partsHtml = '';
  parts.forEach(p=>{ partsHtml += buildExtraPartRowHtml(p.weight, p.reps); });

  showModal(
    '<div class="modal-msg">Drop set ou cluster set — parte extra deste exercício nesta semana.<br>'+
    '<span style="color:var(--muted);font-size:11px;">Drop set: mesma série, cai o peso sem descanso. Cluster set: mesma carga, quebrada em blocos com descanso curto entre eles.</span></div>'+
    '<label>Tipo</label>'+
    '<select id="modalExtraType">'+
      '<option value="drop" '+(type==='drop'?'selected':'')+'>Drop set</option>'+
      '<option value="cluster" '+(type==='cluster'?'selected':'')+'>Cluster set</option>'+
    '</select>'+
    '<label>Partes (peso e reps de cada queda/bloco)</label>'+
    '<div id="extraPartsContainer">'+partsHtml+'</div>'+
    '<button type="button" class="btn-add" style="width:100%;margin-bottom:12px;" onclick="addExtraPartRow()">+ adicionar parte</button>'+
    '<div class="modal-actions">'+
      (existing ? '<button class="btn-cancel" onclick="removeExtraSet(\''+mk+'\',\''+slotId+'\',\''+weekKey+'\')">Remover</button>' : '')+
      '<button class="btn-cancel" onclick="closeModal()">Cancelar</button>'+
      '<button class="btn-confirm" onclick="saveExtraSet(\''+mk+'\',\''+slotId+'\',\''+weekKey+'\')">Salvar</button>'+
    '</div>'
  );
}

function saveExtraSet(mk, slotId, weekKey){
  const type = document.getElementById('modalExtraType').value;
  const rows = document.querySelectorAll('#extraPartsContainer .extra-part-row');
  const parts = [];
  rows.forEach(row=>{
    const w = row.querySelector('.extra-weight').value;
    const r = row.querySelector('.extra-reps').value;
    if(w!=='' || r!==''){
      parts.push({ weight: w!==''?Number(w):undefined, reps: r!==''?Number(r):undefined });
    }
  });
  entries[mk] = entries[mk] || {};
  entries[mk][slotId] = entries[mk][slotId] || {};
  entries[mk][slotId][weekKey] = entries[mk][slotId][weekKey] || {};
  if(parts.length===0){
    delete entries[mk][slotId][weekKey].extra;
  } else {
    entries[mk][slotId][weekKey].extra = {type, parts};
  }
  scheduleSave();
  closeModal();
  renderDayContent();
}

function removeExtraSet(mk, slotId, weekKey){
  if(entries[mk] && entries[mk][slotId] && entries[mk][slotId][weekKey]){
    delete entries[mk][slotId][weekKey].extra;
  }
  scheduleSave();
  closeModal();
  renderDayContent();
}

function editDayFocus(){
  const day = plan.days.find(d=>d.id===activeDayId);
  modalCallback = ()=>{
    const novo = document.getElementById('modalInputFocus').value;
    if(novo && novo.trim()){
      day.focusHistory = day.focusHistory || [];
      day.focusHistory.push({focus: day.focus, until: monthLabel(viewDate)});
      day.focus = novo.trim();
      scheduleSave();
      closeModal();
      renderDayContent();
    }
  };
  showModal(
    '<div class="modal-msg">Editar descrição do dia — isso também atualiza o nome mostrado na aba Análise.</div>'+
    '<label>Descrição</label>'+
    '<input id="modalInputFocus" value="'+escapeAttr(day.focus)+'">'+
    '<div class="modal-actions">'+
      '<button class="btn-cancel" onclick="closeModal()">Cancelar</button>'+
      '<button class="btn-confirm" onclick="modalConfirmAction()">Salvar</button>'+
    '</div>'
  );
}

function renameSlot(dayId, slotId){
  const day = plan.days.find(d=>d.id===dayId);
  const slot = day.slots.find(s=>s.id===slotId);
  modalCallback = ()=>{
    const novo = document.getElementById('modalInputName').value;
    if(novo && novo.trim()){
      slot.history = slot.history || [];
      slot.history.push({name: slot.name, until: monthLabel(viewDate)});
      slot.name = novo.trim();
      scheduleSave();
      closeModal();
      renderDayContent();
    }
  };
  showModal(
    '<div class="modal-msg">Trocar exercício — o histórico anterior é mantido no gráfico.</div>'+
    '<label>Novo nome</label>'+
    '<input id="modalInputName" value="'+escapeAttr(slot.name)+'">'+
    '<div class="modal-actions">'+
      '<button class="btn-cancel" onclick="closeModal()">Cancelar</button>'+
      '<button class="btn-confirm" onclick="modalConfirmAction()">Salvar</button>'+
    '</div>'
  );
}

function addSlot(dayId){
  modalCallback = ()=>{
    const nome = document.getElementById('modalInputName').value;
    if(!nome || !nome.trim()) return;
    const sets = Number(document.getElementById('modalInputSets').value) || 3;
    const reps = document.getElementById('modalInputReps').value || '10';
    const day = plan.days.find(d=>d.id===dayId);
    const id = dayId+'-'+Date.now();
    day.slots.push({id, name:nome.trim(), sets, reps});
    scheduleSave();
    closeModal();
    renderDayContent();
  };
  showModal(
    '<div class="modal-msg">Novo exercício</div>'+
    '<label>Nome</label>'+
    '<input id="modalInputName" placeholder="Ex: Hack machine">'+
    '<label>Séries alvo</label>'+
    '<input id="modalInputSets" type="number" value="3">'+
    '<label>Faixa de reps (ex: 8-10)</label>'+
    '<input id="modalInputReps" value="10">'+
    '<div class="modal-actions">'+
      '<button class="btn-cancel" onclick="closeModal()">Cancelar</button>'+
      '<button class="btn-confirm" onclick="modalConfirmAction()">Adicionar</button>'+
    '</div>'
  );
}

function moveSlot(dayId, slotId, direction){
  const day = plan.days.find(d=>d.id===dayId);
  const idx = day.slots.findIndex(s=>s.id===slotId);
  const newIdx = idx + direction;
  if(idx===-1 || newIdx<0 || newIdx>=day.slots.length) return;
  const tmp = day.slots[idx];
  day.slots[idx] = day.slots[newIdx];
  day.slots[newIdx] = tmp;
  scheduleSave();
  renderDayContent();
}

/* ============ TROCA DE DIAS (treino <-> descanso) ============ */
function buildSwapControl(day){
  const wrap = document.createElement('div');
  wrap.className = 'swap-control';

  const sel = document.createElement('select');
  plan.days.filter(d=>d.id!==day.id).forEach(d=>{
    const opt = document.createElement('option');
    opt.value = d.id;
    opt.textContent = d.label + (d.off ? ' — Descanso' : ' — ' + d.focus);
    sel.appendChild(opt);
  });

  const btn = document.createElement('button');
  btn.className = 'btn-add';
  btn.textContent = 'Trocar dia';
  btn.onclick = ()=>{
    const targetDay = plan.days.find(d=>d.id===sel.value);
    const descA = day.off ? 'Descanso' : day.focus;
    const descB = targetDay.off ? 'Descanso' : targetDay.focus;
    showConfirm(
      'Trocar <b>'+day.label+'</b> ('+escapeHtml(descA)+') com <b>'+targetDay.label+'</b> ('+escapeHtml(descB)+')?<br><br>O histórico dos exercícios acompanha a troca.',
      ()=> swapDays(day.id, targetDay.id)
    );
  };

  wrap.appendChild(sel);
  wrap.appendChild(btn);
  return wrap;
}

function swapDays(idA, idB){
  const a = plan.days.find(d=>d.id===idA);
  const b = plan.days.find(d=>d.id===idB);
  const tmp = {focus:a.focus, off:a.off, slots:a.slots};
  a.focus = b.focus; a.off = b.off; a.slots = b.slots;
  b.focus = tmp.focus; b.off = tmp.off; b.slots = tmp.slots;
  scheduleSave();
  renderDayTabs();
  renderDayContent();
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

/* ============ MODAIS (substituem prompt/confirm nativos) ============ */
let modalCallback = null;

function showModal(html){
  document.getElementById('modalBox').innerHTML = html;
  document.getElementById('modalOverlay').style.display = 'flex';
}
function closeModal(){
  document.getElementById('modalOverlay').style.display = 'none';
  modalCallback = null;
}
function modalConfirmAction(){
  if(modalCallback) modalCallback();
}
function showConfirm(msgHtml, onYes){
  modalCallback = ()=>{ closeModal(); onYes(); };
  showModal(
    '<div class="modal-msg">'+msgHtml+'</div>'+
    '<div class="modal-actions">'+
      '<button class="btn-cancel" onclick="closeModal()">Cancelar</button>'+
      '<button class="btn-confirm" onclick="modalConfirmAction()">Confirmar</button>'+
    '</div>'
  );
}
function escapeAttr(str){
  return escapeHtml(str).replace(/"/g,'&quot;');
}
document.getElementById('modalOverlay').addEventListener('click', (e)=>{
  if(e.target.id==='modalOverlay') closeModal();
});

/* ============ ANALYSIS TAB ============ */
function populateAnalysisSelects(){
  const selDia = document.getElementById('selDia');
  const currentDia = selDia.value;
  selDia.innerHTML = '';
  plan.days.filter(d=>!d.off).forEach(d=>{
    const opt = document.createElement('option');
    opt.value = d.id;
    opt.textContent = d.label+' — '+d.focus;
    selDia.appendChild(opt);
  });
  if(currentDia) selDia.value = currentDia;
  onDiaChange();
}

function onDiaChange(){
  const dayId = document.getElementById('selDia').value;
  const day = plan.days.find(d=>d.id===dayId);
  const selEx = document.getElementById('selExercicio');
  const currentEx = selEx.value;
  selEx.innerHTML = '';
  day.slots.forEach(slot=>{
    const opt = document.createElement('option');
    opt.value = slot.id;
    opt.textContent = slot.name;
    selEx.appendChild(opt);
  });
  if(currentEx && day.slots.some(s=>s.id===currentEx)) selEx.value = currentEx;
  renderCharts();
}

let weeklyChartInstance = null;
let monthlyChartInstance = null;

function volumeFor(entry, isBW){
  // returns null when there's no data (so the chart shows a gap, not a false zero)
  if(!entry) return null;
  const hasExtra = entry.extra && entry.extra.parts && entry.extra.parts.length;
  const hasAny = entry.sets || entry.reps || entry.weight || hasExtra;
  if(!hasAny) return null;
  const s = Number(entry.sets)||0;
  const r = Number(entry.reps)||0;
  const w = Number(entry.weight)||0;
  // Peso corporal: sem carga externa, o volume vira reps totais (séries × reps).
  let vol = isBW ? s*r : s*r*w;
  if(hasExtra){
    entry.extra.parts.forEach(p=>{
      const pr = Number(p.reps)||0;
      const pw = Number(p.weight)||0;
      vol += isBW ? pr : pw*pr;
    });
  }
  return vol;
}

function renderCharts(){
  const slotId = document.getElementById('selExercicio').value;
  if(!slotId){
    return;
  }
  const mk = monthKey(viewDate);
  document.getElementById('monthChartLabel').textContent = monthLabel(viewDate);

  // WEEKLY (within selected month, shown in Treino tab's current viewDate month)
  const weeks = weeksInMonth(viewDate.getFullYear(), viewDate.getMonth());
  const weekLabels = weeks.map(w=>'Sem '+w.index);
  const slotObj = slotById(slotId);
  const chartIsBW = !!(slotObj && slotObj.bodyweight);
  const volLabel = chartIsBW ? 'Volume (séries × reps — peso corporal)' : 'Volume (séries × reps × kg)';
  const weekData = weeks.map(w=>{
    const e = entries[mk] && entries[mk][slotId] ? entries[mk][slotId][String(w.index)] : null;
    return volumeFor(e, chartIsBW);
  });
  const weekReps = weeks.map(w=>{
    const e = entries[mk] && entries[mk][slotId] ? entries[mk][slotId][String(w.index)] : null;
    return (e && e.reps) ? Number(e.reps) : null;
  });

  const wCtx = document.getElementById('weeklyChart');
  if(weeklyChartInstance) weeklyChartInstance.destroy();
  weeklyChartInstance = new Chart(wCtx, {
    type:'line',
    data:{
      labels: weekLabels,
      datasets:[
        {
          label: volLabel,
          data: weekData,
          borderColor:'#D6402C',
          backgroundColor:'rgba(214,64,44,0.15)',
          fill:true,
          tension:0.25,
          spanGaps:false,
          pointRadius:4,
          pointBackgroundColor:'#D6402C',
          yAxisID:'y'
        },
        {
          label:'Reps da última série',
          data: weekReps,
          borderColor:'#5B6472',
          backgroundColor:'transparent',
          borderDash:[5,4],
          fill:false,
          tension:0.25,
          spanGaps:false,
          pointRadius:3,
          pointBackgroundColor:'#5B6472',
          yAxisID:'y1'
        }
      ]
    },
    options:{
      plugins:{
        legend:{
          display:true,
          position:'top',
          labels:{color:'#EDEDED', font:{size:11}, boxWidth:14, padding:12}
        }
      },
      scales:{
        x:{ticks:{color:'#94949A'}, grid:{color:'#2C2C30'}},
        y:{
          position:'left',
          ticks:{color:'#94949A'}, grid:{color:'#2C2C30'}, beginAtZero:true,
          title:{display:true, text: chartIsBW ? 'Volume (reps totais)' : 'Volume (kg levantados)', color:'#94949A', font:{size:11}}
        },
        y1:{
          position:'right',
          ticks:{color:'#94949A'}, grid:{drawOnChartArea:false}, beginAtZero:true,
          title:{display:true, text:'Reps da última série', color:'#94949A', font:{size:11}}
        }
      }
    }
  });

  const validWeekData = weekData.filter(v=>v>0);
  const validReps = weekReps.filter(v=>v!=null);
  const weeklyInsight = document.getElementById('weeklyInsight');
  let insightTxt = '';
  if(validWeekData.length>=2){
    const first = validWeekData[0], last = validWeekData[validWeekData.length-1];
    const pct = first>0 ? Math.round(((last-first)/first)*100) : 0;
    insightTxt = pct>=0
      ? 'Volume subiu '+pct+'% da primeira à última semana registrada neste mês.'
      : 'Volume caiu '+Math.abs(pct)+'% da primeira à última semana registrada — normal em semana de deload, atenção se não for o caso.';
  } else {
    insightTxt = 'Registre pelo menos duas semanas neste mês para ver a tendência.';
  }
  if(validReps.length>=2){
    const rFirst = validReps[0], rLast = validReps[validReps.length-1];
    const dR = rLast - rFirst;
    const dRtxt = dR>0 ? ' (+'+dR+' reps)' : (dR<0 ? ' ('+dR+' reps)' : ' (estável)');
    insightTxt += ' Reps da última série: '+rFirst+' → '+rLast+dRtxt+'.';
  }
  weeklyInsight.textContent = insightTxt;

  // Deltas semana a semana (reps e kg) para o exercício selecionado
  const deltaBox = document.getElementById('weeklyDeltas');
  const slotWeeks = (entries[mk] && entries[mk][slotId]) ? entries[mk][slotId] : {};
  const filledWeeks = Object.keys(slotWeeks).map(Number).sort((a,b)=>a-b)
    .map(k=>({week:k, e:slotWeeks[String(k)]}))
    .filter(x=> x.e && (x.e.reps || x.e.weight || x.e.sets));
  if(filledWeeks.length>=2){
    let html = '';
    for(let i=1;i<filledWeeks.length;i++){
      const a = filledWeeks[i-1], b = filledWeeks[i];
      const dR = (Number(b.e.reps)||0) - (Number(a.e.reps)||0);
      const dK = (Number(b.e.weight)||0) - (Number(a.e.weight)||0);
      html += '<div class="detail-row">'+
        '<span class="exlabel"><span class="weekspan">Sem '+a.week+' → Sem '+b.week+'</span></span>'+
        '<span>'+fmtDelta(dR,'reps')+' · '+fmtDelta(dK,'kg')+'</span>'+
      '</div>';
    }
    deltaBox.innerHTML = html;
    deltaBox.style.display = 'block';
  } else {
    deltaBox.innerHTML = '';
    deltaBox.style.display = 'none';
  }

  // MONTHLY (all months with data for this slot, chronological)
  const monthKeys = Object.keys(entries).filter(k=> entries[k][slotId]).sort();
  const monthLabels = monthKeys.map(k=>{
    const [y,m] = k.split('-').map(Number);
    return MONTH_NAMES[m-1]+'/'+String(y).slice(2);
  });
  const monthData = monthKeys.map(k=>{
    const slotData = entries[k][slotId];
    return Object.values(slotData).reduce((sum,e)=> sum + (volumeFor(e, chartIsBW)||0), 0);
  });

  const mCtx = document.getElementById('monthlyChart');
  if(monthlyChartInstance) monthlyChartInstance.destroy();

  if(monthKeys.length===0){
    document.getElementById('monthlyInsight').textContent = 'Sem dados registrados ainda para este exercício.';
  } else {
    monthlyChartInstance = new Chart(mCtx, {
      type:'bar',
      data:{
        labels: monthLabels,
        datasets:[{
          label:'Volume total do mês',
          data: monthData,
          backgroundColor:'#5B6472',
          borderRadius:4
        }]
      },
      options:{
        plugins:{
          legend:{
            display:true,
            position:'top',
            labels:{color:'#EDEDED', font:{size:11}, boxWidth:14, padding:12}
          }
        },
        scales:{
          x:{ticks:{color:'#94949A'}, grid:{display:false}},
          y:{
            ticks:{color:'#94949A'}, grid:{color:'#2C2C30'}, beginAtZero:true,
            title:{display:true, text: chartIsBW ? 'Volume total (reps no mês)' : 'Volume total (kg levantados no mês)', color:'#94949A', font:{size:11}}
          }
        }
      }
    });

    const monthlyInsight = document.getElementById('monthlyInsight');
    if(monthData.length>=2){
      const first = monthData[0], last = monthData[monthData.length-1];
      const pct = first>0 ? Math.round(((last-first)/first)*100) : 0;
      monthlyInsight.textContent = pct>=0
        ? 'Volume mensal acumulado subiu '+pct+'% desde '+monthLabels[0]+'.'
        : 'Volume mensal caiu '+Math.abs(pct)+'% desde '+monthLabels[0]+' — revise se a carga ou frequência caiu.';
    } else {
      monthlyInsight.textContent = 'Ainda há só um mês de dados — volte no mês seguinte para ver a evolução mensal.';
    }
  }

  renderMonthlyDetail();
}

/* ============ DETALHE POR MÊS ============ */
function fmtDelta(v, unit){
  const num = String(Math.abs(v)).replace('.',',');
  if(v>0) return '<span class="delta-pos">+'+num+' '+unit+'</span>';
  if(v<0) return '<span class="delta-neg">-'+num+' '+unit+'</span>';
  return '<span class="delta-zero">0 '+unit+'</span>';
}

function slotById(slotId){
  for(const d of plan.days){
    const s = d.slots.find(x=>x.id===slotId);
    if(s) return s;
  }
  return null;
}

function slotNameById(slotId){
  const s = slotById(slotId);
  return s ? s.name : slotId;
}

function monthDeltasFor(mk){
  const res = [];
  const monthData = entries[mk] || {};
  Object.keys(monthData).forEach(slotId=>{
    const weeksData = monthData[slotId];
    const filled = Object.keys(weeksData).map(Number).sort((a,b)=>a-b)
      .map(k=>({week:k, e:weeksData[String(k)]}))
      .filter(x=> x.e && (x.e.reps || x.e.weight || x.e.sets));
    if(filled.length===0) return;
    if(filled.length===1){
      res.push({name:slotNameById(slotId), single:true, week:filled[0].week});
      return;
    }
    const first = filled[0], last = filled[filled.length-1];
    res.push({
      name: slotNameById(slotId),
      dReps: (Number(last.e.reps)||0) - (Number(first.e.reps)||0),
      dKg: (Number(last.e.weight)||0) - (Number(first.e.weight)||0),
      firstWeek: first.week,
      lastWeek: last.week
    });
  });
  return res;
}

function renderMonthlyDetail(){
  const container = document.getElementById('monthlyDetail');
  container.innerHTML = '';
  const mks = Object.keys(entries).sort().reverse();
  let rendered = 0;
  mks.forEach((mk, idx)=>{
    const deltas = monthDeltasFor(mk);
    if(deltas.length===0) return;
    rendered++;
    const [y,m] = mk.split('-').map(Number);
    const label = MONTH_NAMES[m-1]+'/'+String(y).slice(2);

    const acc = document.createElement('div');
    acc.className = 'month-acc' + (idx===0 ? ' open' : '');

    const head = document.createElement('div');
    head.className = 'month-acc-head';
    head.innerHTML = '<span>'+label+'</span><span class="chev">▾</span>';
    head.onclick = ()=> acc.classList.toggle('open');

    const body = document.createElement('div');
    body.className = 'month-acc-body';
    deltas.forEach(d=>{
      const row = document.createElement('div');
      row.className = 'detail-row';
      if(d.single){
        row.innerHTML = '<span class="exlabel">'+escapeHtml(d.name)+'</span>'+
          '<span class="delta-zero">só 1 semana registrada (Sem '+d.week+')</span>';
      } else {
        row.innerHTML = '<span class="exlabel">'+escapeHtml(d.name)+
          ' <span class="weekspan">(Sem '+d.firstWeek+' → Sem '+d.lastWeek+')</span></span>'+
          '<span>'+fmtDelta(d.dReps,'reps')+' · '+fmtDelta(d.dKg,'kg')+'</span>';
      }
      body.appendChild(row);
    });

    acc.appendChild(head);
    acc.appendChild(body);
    container.appendChild(acc);
  });
  if(rendered===0){
    container.innerHTML = '<div class="empty-state">Sem dados registrados ainda — preencha semanas na aba Treino.</div>';
  }
}
